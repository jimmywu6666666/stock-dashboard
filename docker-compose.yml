services:
  stock-dashboard:
    build: .
    container_name: stock-dashboard
    restart: unless-stopped
    depends_on:
      - stock-dsa
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DSA_API_BASE_URL: ${DSA_API_BASE_URL:-http://stock-dsa:8000}
      DSA_REPORT_LANGUAGE: ${DSA_REPORT_LANGUAGE:-zh}
      ACCESS_USERNAME: ${ACCESS_USERNAME:-admin}
      ACCESS_PASSWORD: ${ACCESS_PASSWORD:-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-please-change-this-session-secret}
      TENCENT_SECRET_ID: ${TENCENT_SECRET_ID:-}
      TENCENT_SECRET_KEY: ${TENCENT_SECRET_KEY:-}
      TENCENT_REGION: ${TENCENT_REGION:-ap-guangzhou}
      TENCENT_OCR_ACTION: ${TENCENT_OCR_ACTION:-GeneralAccurateOCR}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OCR_API_URL: ${OCR_API_URL:-}
      OCR_API_KEY: ${OCR_API_KEY:-}
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-false}
      SIGNUP_CODE: ${SIGNUP_CODE:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      DAILY_REPORT_TIME: ${DAILY_REPORT_TIME:-16:30}
      REPORT_SMTP_HOST: ${REPORT_SMTP_HOST:-}
      REPORT_SMTP_PORT: ${REPORT_SMTP_PORT:-465}
      REPORT_SMTP_SECURE: ${REPORT_SMTP_SECURE:-true}
      REPORT_SMTP_USER: ${REPORT_SMTP_USER:-}
      REPORT_SMTP_PASS: ${REPORT_SMTP_PASS:-}
      REPORT_EMAIL_FROM: ${REPORT_EMAIL_FROM:-}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      TUSHARE_API_URL: ${TUSHARE_API_URL:-}
      NT_KEYWORDS: ${NT_KEYWORDS:-}
      NT_REFRESH_LIMIT: ${NT_REFRESH_LIMIT:-120}
      NT_COST_DISCOUNT: ${NT_COST_DISCOUNT:-0.95}
      NT_AUTO_REFRESH_ENABLED: ${NT_AUTO_REFRESH_ENABLED:-true}
      NT_DAILY_REFRESH_TIME: ${NT_DAILY_REFRESH_TIME:-20:30}
      NT_REFRESH_RETRY_COUNT: ${NT_REFRESH_RETRY_COUNT:-3}
      NT_REFRESH_RETRY_DELAY_MS: ${NT_REFRESH_RETRY_DELAY_MS:-900000}
      ETF_DAILY_REFRESH_TIMES: ${ETF_DAILY_REFRESH_TIMES:-09:45,10:30,11:30,13:30,14:30,15:15,17:45,18:30,20:30,08:30}
      ETF_DAILY_FULL_REFRESH_TIMES: ${ETF_DAILY_FULL_REFRESH_TIMES:-15:15,20:30}
      ETF_DAILY_FINAL_TIME: ${ETF_DAILY_FINAL_TIME:-08:30}
      ETF_DAILY_COVERAGE_TARGET: ${ETF_DAILY_COVERAGE_TARGET:-0.95}
    volumes:
      - ./data:/app/data

  stock-dsa:
    build:
      context: ./daily_stock_analysis
      dockerfile: docker/Dockerfile
    container_name: stock-dsa
    restart: unless-stopped
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - ./.env
    environment:
      TZ: Asia/Shanghai
      WEBUI_HOST: 0.0.0.0
      API_PORT: 8000
      REPORT_LANGUAGE: ${DSA_REPORT_LANGUAGE:-zh}
      DATABASE_PATH: /app/data/stock_analysis.db
      LOG_DIR: /app/logs
    volumes:
      - ./daily_stock_analysis/data:/app/data
      - ./daily_stock_analysis/logs:/app/logs
      - ./daily_stock_analysis/reports:/app/reports
      - ./daily_stock_analysis/strategies:/app/strategies:ro
    expose:
      - "8000"
